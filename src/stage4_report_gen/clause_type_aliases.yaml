# Stage 3 free-form clause label → canonical CUAD type.
#
# Stage 3 emits clause_type strings that are mostly aligned with the 41 CUAD
# categories but vary in spacing, casing, and abbreviation. This file is the
# normalization table the aggregator consults before grouping / pattern
# derivation / recommendation lookup.
#
# Canonical types are listed as identity entries so a normalize() lookup
# always succeeds. Lookups are case-insensitive and ignore leading/trailing
# whitespace; the aggregator handles that — store keys here in their natural
# form for readability.
#
# Conventions:
#   - Canonical names use Title Case with hyphenation matching CUAD's own
#     usage (e.g. "Anti-Assignment", "Cap On Liability", "Most Favored Nation").
#   - The 5 metadata types (Document Name, Parties, Agreement Date,
#     Effective Date, Expiration Date) are NOT risk-classified — they route
#     to the report header. They appear here so the aggregator can recognize
#     and skip them cleanly.

