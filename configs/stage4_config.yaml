# Stage 4: Report Generation

# LLM for executive summary (reuses the same server as Stage 3)
# To switch provider: change llm_provider + agent_model; set env var for API key
llm_provider:   openai_compatible          # options: openai_compatible | gemini | anthropic
agent_model:    meta-llama/llama-3.1-8b-instruct
agent_base_url: https://openrouter.ai/api/v1
agent_api_key:  YOUR_OPENROUTER_API_KEY
agent_max_tokens: 256                      # executive summary is short; 256 is ample

output_format: json
